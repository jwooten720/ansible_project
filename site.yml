---

- hosts: all
  become: true
  pre_tasks:

  - name: install updates (RedHat)
    package:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "RedHat"

  - name: install updates (Ubuntu)
    package:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "Ubuntu"

- hosts: web_servers
  become: true 
  tasks:

  - name: install apache and php package Red Hat servers
    package:
      name: 
         - httpd
         - php
      state: latest
      update_cache: yes
    when: ansible_distribution == "RedHat"

  - name: install apache and php for Ubuntu servers
    package:
      name: 
        - apache2
        - libapache2-mod-php
      state: latest
      update_cache: yes
    when: ansible_distribution == "Ubuntu"

- hosts: db_servers
  become: true
  tasks:

   - name: install mariadb package (RedHat)
     package:
       name: mariadb
       state: latest
     when: ansible_distribution == "RedHat"

   - name: install mariadb package (Ubuntu)
     package:
       name: mariadb-server
       state: latest 
     when: ansible_distribution == "Ubuntu"
